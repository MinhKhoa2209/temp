apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdisallowedtags
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  crd:
    spec:
      names:
        kind: K8sDisallowedTags
      validation:
        openAPIV3Schema:
          type: object
          properties:
            tags:
              type: array
              items:
                type: string
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8sdisallowedtags

      violation[{"msg": msg}] {
        container := input.review.object.spec.containers[_]
        tag := input.parameters.tags[_]
        endswith(container.image, sprintf(":%s", [tag]))
        msg := sprintf("container <%s> uses disallowed image tag <%s>", [container.name, tag])
      }

      violation[{"msg": msg}] {
        container := input.review.object.spec.initContainers[_]
        tag := input.parameters.tags[_]
        endswith(container.image, sprintf(":%s", [tag]))
        msg := sprintf("initContainer <%s> uses disallowed image tag <%s>", [container.name, tag])
      }
