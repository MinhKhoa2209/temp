apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredresources
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredResources
      validation:
        openAPIV3Schema:
          type: object
          properties:
            limits:
              type: array
              items:
                type: string
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8srequiredresources

      violation[{"msg": msg}] {
        container := input.review.object.spec.containers[_]
        resource := input.parameters.limits[_]
        not container.resources.limits[resource]
        msg := sprintf("container <%s> must define resources.limits.%s", [container.name, resource])
      }

      violation[{"msg": msg}] {
        container := input.review.object.spec.initContainers[_]
        resource := input.parameters.limits[_]
        not container.resources.limits[resource]
        msg := sprintf("initContainer <%s> must define resources.limits.%s", [container.name, resource])
      }
