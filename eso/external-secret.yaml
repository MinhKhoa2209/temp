apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-db-password
  namespace: demo
spec:
  refreshInterval: 60s
  secretStoreRef:
    name: aws-store
    kind: SecretStore
  target:
    name: api-db-password
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: w10/demo/api-db-password
      property: password